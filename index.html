<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
  body{
margin:0;
font-family: Arial;
background:white;
color:white;
text-align:center;
}

body{
background:url("img/img.jpg");
background-size:cover;
background-position:center;
}

header{
background:rgba(0,0,0,0.5);
padding:20px;
}

/* GLOW TITLE */

.glow-title{
font-size:40px;
letter-spacing:3px;
color:goldenrod;
animation:glow 2s ease-in-out infinite alternate;
}

@keyframes glow{

from{
text-shadow:
0 0 10px goldenrod,
0 0 20px goldenrod,
0 0 30px goldenrod;
}

to{
text-shadow:
0 0 20px goldenrod,
0 0 30px goldenrod,
0 0 40px goldenrod;
}

}


nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:18px;
}

nav a:hover{
color:goldenrod;
}

.hero{
height:90vh;
background:url("hero.jpg") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
}

.hero-text{
background:rgba(0,0,0,0.5);
padding:40px;
border-radius:10px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 30px;
background:goldenrod;
color:white;
text-decoration:none;
border-radius:30px;
transition:0.3s;
box-shadow:0 0 10px goldenrod;
}

.btn:hover{
box-shadow:0 0 25px goldenrod;
transform:scale(1.05);
}

.memories{
padding:50px;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
}

.card img{
width:100%;
border-radius:10px;
}

.card p{
margin-top:10px;
}

.letter{
padding:60px;
max-width:700px;
margin:auto;
line-height:1.8;
}

footer{
background:rgba(0,0,0,0.5);
padding:15px;
margin-top:40px;
}
</style>
<body>

<header>
<h2 id="typing"></h2>
<script>
const text = "HAPPY BORN DAY MY MR❤️";
let index = 0;

function typeEffect() {
  if (index < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(index);
    index++;
    setTimeout(typeEffect, 70);
  }
}

typeEffect();
</script>

<nav>
<a href="index.html">Home</a>
<a href="memories.html">Memories</a>
<a href="letter.html">My Letter</a>
</nav>
</header>


<section class="hero">
<div class="hero-text">
<h2>To The Most Special Person In My Life</h2>

<p>
This little website is a small surprise for your birthday.
Every word here comes straight from my heart.
</p>

<a href="surprised.html" class="btn">Open My Surprise</a>
</div>
</section>


<footer>
<p>Made with Love ❤️ | Happy Birthday KHUBAIB</p>
</footer>

</body>
</html>
